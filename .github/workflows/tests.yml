name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whitespace
        run: git diff-tree --check --no-commit-id --root -r HEAD

      - name: Check text line endings
        shell: bash
        run: |
          found=0
          while IFS= read -r -d '' file; do
            if grep -q $'\r' "$file"; then
              echo "CR character detected in $file"
              found=1
            fi
          done < <(
            git ls-files -z -- \
              '*.py' \
              '*.md' \
              '*.yml' \
              '*.yaml' \
              '*.txt' \
              '*.json' \
              '*.smi' \
              '*.smiles' \
              '*.sh' \
              'Dockerfile' \
              '*.ini' \
              'requirements*.txt'
          )
          exit "$found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ligandhub-api:test .
